server {
    listen 80;
    charset utf-8;
    __SKYRADAR_BASIC_AUTH_LINE_1__
    __SKYRADAR_BASIC_AUTH_LINE_2__
    location / {
        gzip on;
        gzip_min_length 1k;
        gzip_buffers 16 64k;
        gzip_http_version 1.1;
        gzip_comp_level 9;
        gzip_types text/plain text/javascript application/javascript image/jpeg image/gif image/png application/font-woff application/x-javascript text/css application/xml;
        gzip_vary on;
        root /SkyRadar/client/dist;
        try_files $uri /index.html;
        index index.html index.htm index.php;
    }
    location ~ /assets/ {
        gzip on;
        gzip_min_length 1k;
        gzip_buffers 16 64k;
        gzip_http_version 1.1;
        gzip_comp_level 9;
        gzip_types text/plain text/javascript application/javascript image/jpeg image/gif image/png application/font-woff application/x-javascript text/css application/xml;
        gzip_vary on;
        root /SkyRadar/client/dist;
        try_files $uri =404;
    }
    location = /favicon.svg {
        root /SkyRadar/client/dist;
        try_files $uri =404;
    }
    location = /icons.svg {
        root /SkyRadar/client/dist;
        try_files $uri =404;
    }
    location /api {
        gzip_min_length 1k;
        gzip_buffers 16 64k;
        gzip_http_version 1.1;
        gzip_comp_level 9;
        gzip_types text/plain text/javascript application/javascript image/jpeg image/gif image/png application/font-woff application/x-javascript text/css application/xml;
        gzip_vary on;
        proxy_pass http://__SKYRADAR_NGINX_UPSTREAM__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /static {
        gzip_min_length 1k;
        gzip_buffers 16 64k;
        gzip_http_version 1.1;
        gzip_comp_level 9;
        gzip_types text/plain text/javascript application/javascript image/jpeg image/gif image/png application/font-woff application/x-javascript text/css application/xml;
        gzip_vary on;
        root /SkyRadar/client/dist;
    }
}
