openapi: 3.0.3
info:
  title: SkyRadar REST API
  version: 1.0.0
  description: |
    SkyRadar 最终 RESTful API 契约源。所有业务接口使用 `/api/v1/*` 路径。

    成功响应统一使用 `data`、`meta`、`links`；错误响应统一使用
    `error`、`message`、`detail`、`request_id`。
servers:
  - url: /
tags:
  - name: Health
    description: 服务和依赖健康检查
  - name: Docs
    description: OpenAPI 和 Swagger UI 文档入口，生产默认关闭
  - name: Leakages
    description: 泄露结果查询、详情、代码和处理
  - name: Statistics
    description: 仪表盘趋势和聚合统计
  - name: Settings
    description: GitHub 账号、规则、任务、通知和黑名单设置
paths:
  /api/v1/health:
    get:
      tags:
        - Health
      summary: 检查 API 和依赖可用性
      operationId: getHealth
      responses:
        "200":
          description: API 可响应，依赖状态在 data 中返回。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSuccess"
              example:
                data:
                  api:
                    ok: true
                  github:
                    ok: true
                    message: reachable
                  mongodb:
                    ok: true
                    message: ping ok
                  redis:
                    ok: true
                    message: ping ok
                meta:
                  checked_at: "2026-06-15T10:00:00Z"
                links:
                  self: /api/v1/health
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/openapi.json:
    get:
      tags:
        - Docs
      summary: 获取 OpenAPI JSON
      description: 默认关闭；仅在受控文档开关启用时返回当前契约。
      operationId: getOpenApiJson
      responses:
        "200":
          description: OpenAPI JSON schema。
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/docs:
    get:
      tags:
        - Docs
      summary: 打开 Swagger UI
      description: 默认关闭；UI 读取 `/api/v1/openapi.json`。
      operationId: getSwaggerDocs
      responses:
        "200":
          description: Swagger UI HTML。
          content:
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/leakages:
    get:
      tags:
        - Leakages
      summary: 获取泄露结果列表
      operationId: listLeakages
      parameters:
        - name: security
          in: query
          required: false
          description: 安全状态过滤，0 表示待确认风险，1 表示安全或忽略。
          schema:
            type: integer
            enum:
              - 0
              - 1
          example: 0
        - name: ignored
          in: query
          required: false
          description: 是否忽略。
          schema:
            type: boolean
          example: false
        - name: reviewed
          in: query
          required: false
          description: 是否已有处理备注。
          schema:
            type: boolean
          example: true
        - name: tag
          in: query
          required: false
          description: 规则标签过滤。
          schema:
            type: string
          example: github-token
        - name: language
          in: query
          required: false
          description: 语言过滤。
          schema:
            type: string
          example: Python
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 泄露结果分页列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeakageListSuccess"
              example:
                data:
                  - _id: leak-001
                    link: https://github.com/example/repo/blob/main/config.py
                    project: example/repo
                    project_url: https://github.com/example/repo
                    language: Python
                    username: example
                    avatar_url: https://avatars.githubusercontent.com/u/1?v=4
                    filepath: config.py
                    filename: config.py
                    security: 0
                    ignore: 0
                    tag: github-token
                    desc: ""
                    datetime: "2026-06-15T10:00:00Z"
                meta:
                  page: 1
                  page_size: 20
                  total: 1
                links:
                  self: /api/v1/leakages?page=1&page_size=20
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/leakages/{leakage_id}:
    get:
      tags:
        - Leakages
      summary: 获取泄露详情元信息
      operationId: getLeakage
      parameters:
        - $ref: "#/components/parameters/LeakageId"
      responses:
        "200":
          description: 泄露详情元信息，不包含代码正文。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeakageSuccess"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Leakages
      summary: 更新泄露处理结果
      operationId: updateLeakage
      parameters:
        - $ref: "#/components/parameters/LeakageId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeakageUpdateRequest"
            example:
              security: 0
              ignored: false
              desc: 确认为有效泄露
              project: example/repo
      responses:
        "200":
          description: 泄露处理结果已更新。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeakageSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/leakages/{leakage_id}/code:
    get:
      tags:
        - Leakages
      summary: 获取泄露代码和受影响资产
      operationId: getLeakageCode
      parameters:
        - $ref: "#/components/parameters/LeakageId"
      responses:
        "200":
          description: 泄露代码和受影响资产。代码内容为 base64 编码字符串。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeakageCodeSuccess"
              example:
                data:
                  code: U0tZX1NBTVBMRV9LRVk=
                  affect:
                    - type: file
                      value: config.py
                meta: {}
                links:
                  self: /api/v1/leakages/leak-001/code
                  leakage: /api/v1/leakages/leak-001
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/trends:
    get:
      tags:
        - Statistics
      summary: 获取仪表盘趋势和任务运行信息
      operationId: getTrend
      parameters:
        - name: tag
          in: query
          required: false
          schema:
            type: string
          example: github-token
      responses:
        "200":
          description: 仪表盘趋势。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendSuccess"
  /api/v1/statistics:
    get:
      tags:
        - Statistics
      summary: 获取聚合统计
      operationId: listStatistics
      parameters:
        - name: group_by
          in: query
          required: false
          description: 聚合字段。
          schema:
            type: string
            enum:
              - tag
              - language
            default: tag
        - name: tag
          in: query
          required: false
          schema:
            type: string
          example: github-token
      responses:
        "200":
          description: 聚合统计结果。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatisticListSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/github-accounts:
    get:
      tags:
        - Settings
      summary: 获取 GitHub 账号列表
      operationId: listGithubAccounts
      responses:
        "200":
          description: GitHub 账号列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubAccountListSuccess"
    post:
      tags:
        - Settings
      summary: 新增 GitHub 账号或 token
      operationId: createGithubAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GithubAccountRequest"
            example:
              username: skyradar-bot
              token: <token>
      responses:
        "201":
          description: GitHub 账号已创建。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubAccountSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/github-accounts/{username}:
    delete:
      tags:
        - Settings
      summary: 删除 GitHub 账号
      operationId: deleteGithubAccount
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          example: skyradar-bot
      responses:
        "204":
          description: GitHub 账号已删除；响应不返回 body。
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/search-rules:
    get:
      tags:
        - Settings
      summary: 获取监控规则
      operationId: listQueryRules
      responses:
        "200":
          description: 监控规则列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryRuleListSuccess"
    post:
      tags:
        - Settings
      summary: 创建监控规则
      operationId: createQueryRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRuleRequest"
            example:
              keyword: '"ghp_" password'
              tag: github-token
              enabled: true
      responses:
        "201":
          description: 监控规则已创建。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryRuleSuccess"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/search-rules/{tag}:
    put:
      tags:
        - Settings
      summary: 更新监控规则
      operationId: updateQueryRule
      parameters:
        - $ref: "#/components/parameters/SearchRuleTag"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRuleRequest"
      responses:
        "200":
          description: 监控规则已更新。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryRuleSuccess"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags:
        - Settings
      summary: 删除监控规则
      operationId: deleteQueryRule
      parameters:
        - $ref: "#/components/parameters/SearchRuleTag"
      responses:
        "204":
          description: 监控规则已删除；响应不返回 body。
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/task-schedules/current:
    get:
      tags:
        - Settings
      summary: 获取当前任务调度设置
      operationId: getTaskSchedule
      responses:
        "200":
          description: 当前任务调度设置。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskScheduleSuccess"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Settings
      summary: 保存当前任务调度设置
      operationId: replaceTaskSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskScheduleRequest"
            example:
              page: 10
              minute: 30
      responses:
        "200":
          description: 当前任务调度设置已保存。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskScheduleSuccess"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/blacklist-items:
    get:
      tags:
        - Settings
      summary: 获取黑名单
      operationId: listBlacklistItems
      responses:
        "200":
          description: 黑名单列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlacklistItemListSuccess"
    post:
      tags:
        - Settings
      summary: 新增黑名单项
      operationId: createBlacklistItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlacklistItemRequest"
            example:
              text: example.com
      responses:
        "201":
          description: 黑名单项已创建。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlacklistItemSuccess"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/blacklist-items/{text}:
    delete:
      tags:
        - Settings
      summary: 删除黑名单项
      operationId: deleteBlacklistItem
      parameters:
        - $ref: "#/components/parameters/BlacklistText"
      responses:
        "204":
          description: 黑名单项已删除；响应不返回 body。
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/notification-recipients:
    get:
      tags:
        - Settings
      summary: 获取邮件通知接收人
      operationId: listNoticeRecipients
      responses:
        "200":
          description: 邮件通知接收人列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoticeRecipientListSuccess"
    post:
      tags:
        - Settings
      summary: 新增邮件通知接收人
      operationId: createNoticeRecipient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoticeRecipientRequest"
            example:
              mail: security@example.com
      responses:
        "201":
          description: 邮件通知接收人已创建。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoticeRecipientSuccess"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/notification-recipients/{mail}:
    delete:
      tags:
        - Settings
      summary: 删除邮件通知接收人
      operationId: deleteNoticeRecipient
      parameters:
        - name: mail
          in: path
          required: true
          schema:
            type: string
          example: security@example.com
      responses:
        "204":
          description: 邮件通知接收人已删除；响应不返回 body。
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/mail-settings/current:
    get:
      tags:
        - Settings
      summary: 获取 SMTP 配置
      operationId: getMailSetting
      responses:
        "200":
          description: SMTP 配置，不包含 SMTP 密码。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailSettingSuccess"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Settings
      summary: 保存 SMTP 配置
      operationId: replaceMailSetting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MailSettingRequest"
            example:
              from: skyradar@example.com
              host: smtp.example.com
              port: 587
              tls: true
              username: skyradar@example.com
              password: <password>
              domain: https://skyradar.example.com
              enabled: true
      responses:
        "200":
          description: SMTP 配置已保存，不返回 SMTP 密码。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailSettingSuccess"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/webhooks:
    get:
      tags:
        - Settings
      summary: 获取 webhook 配置
      operationId: listWebhooks
      responses:
        "200":
          description: webhook 配置列表。响应只包含脱敏 URL 和稳定 ID。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookListSuccess"
    post:
      tags:
        - Settings
      summary: 创建 webhook 配置
      operationId: createWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookRequest"
            example:
              provider: dingtalk
              webhook_url: https://oapi.dingtalk.com/robot/send?access_token=<token>
              secret: <secret>
              domain: https://skyradar.example.com
              enabled: true
      responses:
        "201":
          description: webhook 配置已创建。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/webhooks/{webhook_id}:
    delete:
      tags:
        - Settings
      summary: 删除 webhook 配置
      operationId: deleteWebhook
      parameters:
        - name: webhook_id
          in: path
          required: true
          schema:
            type: string
          example: webhook-001
      responses:
        "204":
          description: webhook 配置已删除；响应不返回 body。
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/webhook-tests:
    post:
      tags:
        - Settings
      summary: 发送 webhook 测试任务
      operationId: createWebhookTest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookRequest"
      responses:
        "201":
          description: webhook 测试消息已发送。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookTestSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"
components:
  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      example: 1
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20
    LeakageId:
      name: leakage_id
      in: path
      required: true
      schema:
        type: string
      example: leak-001
    SearchRuleTag:
      name: tag
      in: path
      required: true
      schema:
        type: string
      example: github-token
    BlacklistText:
      name: text
      in: path
      required: true
      schema:
        type: string
      example: obsolete-secret
  responses:
    BadRequest:
      description: 请求格式或参数无法处理。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 未认证或外部凭据不可用。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 资源不存在。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: 资源状态冲突。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: 请求语义校验失败。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: 依赖服务不可用或系统暂不可用。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ApiSuccess:
      type: object
      required:
        - data
      properties:
        data:
          nullable: true
        meta:
          type: object
          additionalProperties: true
        links:
          type: object
          additionalProperties:
            type: string
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          pattern: "^[a-z0-9_]+$"
          example: invalid_request
        message:
          type: string
          example: 请求参数无效
        detail:
          type: object
          additionalProperties: true
          example:
            field: page_size
            reason: must be between 1 and 100
        request_id:
          type: string
          nullable: true
          example: req_01HZYXAMPLE
    PageMeta:
      type: object
      required:
        - page
        - page_size
        - total
      properties:
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
    HealthSuccess:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Health"
    Health:
      type: object
      required:
        - api
        - github
        - mongodb
        - redis
      properties:
        api:
          $ref: "#/components/schemas/HealthItem"
        github:
          $ref: "#/components/schemas/HealthItem"
        mongodb:
          $ref: "#/components/schemas/HealthItem"
        redis:
          $ref: "#/components/schemas/HealthItem"
    HealthItem:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
        message:
          type: string
        latency_ms:
          type: integer
          minimum: 0
    LeakageListSuccess:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Leakage"
            meta:
              $ref: "#/components/schemas/PageMeta"
    LeakageSuccess:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Leakage"
    Leakage:
      type: object
      required:
        - _id
        - link
        - project
        - security
        - ignore
        - tag
        - datetime
      properties:
        _id:
          type: string
        link:
          type: string
          format: uri
        project:
          type: string
        project_url:
          type: string
          format: uri
        language:
          type: string
        username:
          type: string
        avatar_url:
          type: string
          format: uri
        filepath:
          type: string
        filename:
          type: string
        security:
          type: integer
          enum:
            - 0
            - 1
        ignore:
          type: integer
          enum:
            - 0
            - 1
        tag:
          type: string
        desc:
          type: string
        datetime:
          type: string
    LeakageUpdateRequest:
      type: object
      required:
        - security
      properties:
        project:
          type: string
        security:
          type: integer
          enum:
            - 0
            - 1
        ignored:
          type: boolean
        desc:
          type: string
    LeakageCodeSuccess:
